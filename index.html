<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Strength Checker</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      transition: background 0.3s, color 0.3s;
    }
    :root {
      --bg-color: #f4f4f4;
      --text-color: #333;
      --bar-bg: #ddd;
    }
    .dark {
      --bg-color: #121212;
      --text-color: #f4f4f4;
      --bar-bg: #333;
    }
    .container {
      width: 90%;
      max-width: 400px;
      padding: 20px;
      border-radius: 10px;
      background: var(--bar-bg);
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
    .strength-bar {
      height: 10px;
      width: 100%;
      background: #ddd;
      border-radius: 5px;
      margin: 10px 0;
      overflow: hidden;
    }
    .strength-fill {
      height: 100%;
      width: 0%;
      transition: width 0.5s ease, background 0.5s ease;
    }
    .conditions {
      font-size: 14px;
      margin-top: 10px;
    }
    .conditions span {
      display: block;
      margin: 3px 0;
    }
    .toggle {
      margin-top: 10px;
      cursor: pointer;
      font-size: 14px;
    }
    .mode-toggle {
      margin-top: 15px;
      cursor: pointer;
      font-size: 14px;
      text-align: center;
    }
    .suggestions {
      margin-top: 10px;
      font-size: 13px;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Password Strength Checker</h2>
    <input type="password" id="password" placeholder="Enter password">
    <div class="toggle" onclick="togglePassword()">Show/Hide Password</div>
    <div class="strength-bar">
      <div class="strength-fill" id="strength-fill"></div>
    </div>
    <div id="strength-text"></div>
    <div class="conditions" id="conditions"></div>
    <div class="suggestions" id="suggestions"></div>
    <div class="mode-toggle" onclick="toggleMode()">Toggle Dark/Light Mode</div>
  </div>

  <script>
    const passwordInput = document.getElementById("password");
    const strengthFill = document.getElementById("strength-fill");
    const strengthText = document.getElementById("strength-text");
    const conditionsDiv = document.getElementById("conditions");
    const suggestionsDiv = document.getElementById("suggestions");

    passwordInput.addEventListener("input", checkStrength);

    function checkStrength() {
      const password = passwordInput.value;
      let strength = 0;
      let conditions = [];

      // Conditions
      if (password.length >= 8) { strength++; conditions.push("✔ Minimum 8 characters"); }
      else { conditions.push("✘ Minimum 8 characters"); }

      if (/[A-Z]/.test(password)) { strength++; conditions.push("✔ Uppercase letter"); }
      else { conditions.push("✘ Uppercase letter"); }

      if (/[a-z]/.test(password)) { strength++; conditions.push("✔ Lowercase letter"); }
      else { conditions.push("✘ Lowercase letter"); }

      if (/[0-9]/.test(password)) { strength++; conditions.push("✔ Number"); }
      else { conditions.push("✘ Number"); }

      if (/[^A-Za-z0-9]/.test(password)) { strength++; conditions.push("✔ Special character"); }
      else { conditions.push("✘ Special character"); }

      // Strength bar
      let strengthPercent = (strength / 5) * 100;
      strengthFill.style.width = strengthPercent + "%";

      if (strength <= 2) {
        strengthFill.style.background = "red";
        strengthText.textContent = "Weak";
        suggestionsDiv.textContent = "Try adding uppercase, numbers, and special characters.";
      } else if (strength === 3 || strength === 4) {
        strengthFill.style.background = "yellow";
        strengthText.textContent = "Medium";
        suggestionsDiv.textContent = "Add more variety for a stronger password.";
      } else {
        strengthFill.style.background = "green";
        strengthText.textContent = "Strong";
        suggestionsDiv.textContent = "Great password!";
      }

      conditionsDiv.innerHTML = conditions.join("<br>");
    }

    function togglePassword() {
      passwordInput.type = passwordInput.type === "password" ? "text" : "password";
    }

    function toggleMode() {
      document.body.classList.toggle("dark");
    }
  </script>
</body>
</html>
